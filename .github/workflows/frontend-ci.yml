name: Frontend CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>&1 | tee /tmp/lint-output.txt

      - name: Comment on PR lint failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let output = ''
            try { output = fs.readFileSync('/tmp/lint-output.txt', 'utf8') } catch (e) {}
            if (output.length > 3000) output = output.slice(0, 3000) + '\n...(truncated)'
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Lint failed** on \`${{ github.sha }}\` — fix these errors before tests can run.\n\n\`\`\`\n${output}\n\`\`\`\n\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test 2>&1 | tee /tmp/test-output.txt

      - name: Build app
        run: npm run build 2>&1 | tee /tmp/build-output.txt

      - name: Comment on PR test failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const read = (p) => { try { return fs.readFileSync(p, 'utf8') } catch (e) { return '' } }
            let testOut = read('/tmp/test-output.txt')
            let buildOut = read('/tmp/build-output.txt')
            const truncate = (s) => s.length > 2000 ? s.slice(0, 2000) + '\n...(truncated)' : s
            let body = `❌ **CI failed** on \`${{ github.sha }}\`.\n`
            if (testOut)  body += `\n**Test output:**\n\`\`\`\n${truncate(testOut)}\n\`\`\`\n`
            if (buildOut) body += `\n**Build output:**\n\`\`\`\n${truncate(buildOut)}\n\`\`\`\n`
            body += `\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })