name: Trigger Staging Deploy

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - release
      - 'release/**'

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Trigger infrastructure staging deploy
        run: |
          BRANCH="${{ github.base_ref }}"

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/CHR-DevOps/app-infrastructure/dispatches \
            -d '{
              "event_type": "frontend-updated",
              "client_payload": {
                "branch": "'"${BRANCH}"'",
                "event_name": "${{ github.event_name }}",
                "source_repo": "app-frontend"
              }
            }'
