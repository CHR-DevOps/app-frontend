name: Trigger Staging Deploy

on:
  push:
    branches:
      - main
      - release
      - 'release/**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release
      - 'release/**'

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger infrastructure staging deploy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/CHR-DevOps/app-infrastructure/dispatches \
            -d '{
              "event_type": "frontend-updated",
              "client_payload": {
                "branch": "'"${BRANCH}"'",
                "event_name": "${{ github.event_name }}",
                "source_repo": "app-frontend"
              }
            }'
